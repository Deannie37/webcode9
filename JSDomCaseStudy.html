<!DOCTYPE html>
<html>
<head>
    <title>JS DOM</title>
</head>
<body>

<h2>Create Account</h2>

<form id="form">
    First Name: <input type="text" id="fname"><br><br>
    Last Name: <input type="text" id="lname"><br><br>
    Email: <input type="email" id="email"><br><br>
    Phone: <input type="text" id="phone"><br><br>
    Password: <input type="password" id="pass"><br><br>
    Confirm Password: <input type="password" id="cpass"><br><br>
    <button type="button" onclick="create()">Create</button>
</form>

<script>
function create() {
    var fname = document.getElementById("fname").value;
    var lname = document.getElementById("lname").value;
    var email = document.getElementById("email").value;
    var phone = document.getElementById("phone").value;
    var pass = document.getElementById("pass").value;
    var cpass = document.getElementById("cpass").value;

    console.log("First Name: " + fname);
    console.log("Last Name: " + lname);
    console.log("Email: " + email);
    console.log("Phone: " + phone);

    if (pass === cpass) {
        console.log("Password sama");
    } else {
        console.log("Password tidak sama");
    }
}
</script>

</body>
</html>
