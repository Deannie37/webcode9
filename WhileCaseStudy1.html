<!DOCTYPE html>
<html>
<head>
    <title>While 10 Angka</title>
</head>
<body>
    <script>
        var total = 0;
        var i = 1;

        while (i <= 10) {
            var angka = parseInt(prompt("Masukkan angka ke-" + i + ":"));
            total = total + angka;
            i++;
        }

        console.log("Total jumlah 10 angka adalah: " + total);
    </script>
</body>
</html>
